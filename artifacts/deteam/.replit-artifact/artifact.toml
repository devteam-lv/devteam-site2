kind = "web"
previewPath = "/"
title = "DETEAM"
version = "1.0.0"
id = "artifacts/deteam"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23840

[services.development]
run = "pnpm --filter @workspace/deteam run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deteam", "run", "build" ]
publicDir = "artifacts/deteam/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23840"
BASE_PATH = "/"
